- name: Stuti Parikh
  role: MPH student
  photo: /images/Stuti_Parikh.jpeg
  bio: I am an MPH student in Epidemiology at the UTHealth Houston School of Public Health. I have earned Bachelor of Dental Surgery (BDS) and have clinical experience as a dental practitioner. My interests include infectious disease epidemiology, chronic disease prevention, and health disparities. I am interested in applying epidemiologic and statistical methods to real-world public health problems and hope to pursue a career in research and public health.
  website: https://bikaiming93.github.io/teams/

- name: Sophia Li
  role: Undergraduate Lab Intern
  photo: /images/Sophia_Li.JPEG
  bio: Sophia is a sophomore Informatics and Behavioral Data Science double major at the University of Texas at Austin. She has a strong interest in using quantitative methods to address real-world health challenges. After graduation, she plans to attend graduate school for biostatistics or data science with hopes of pursuing a career at the intersection of data science and public health.
  website: https://bikaiming93.github.io/teams/

- name: Niam Jasani
  role: Undergraduate Lab Intern
  photo: /images/Niam_Jasani.JPEG
  bio: Niam is a first-year undergraduate student at the University of Texas at Austin, majoring in Public Health with plans to pursue an MD. His research interests include health policy and virology, and he is interested in gaining experience in the lab. Outside of academics. Niam enjoys playing pickleball, poker, and spending time with friends.
  website: https://bikaiming93.github.io/teams/

- name: Taiwo Babatunde
  role: Master Lab Intern
  photo: /images/Taiwo_Babatunde.JPEG
  bio: Taiwo Babatunde is an MSc candidate in One Health and Disease Modelling at African Centre of Excellence for Public Health and Toxicology Research (ACE‑PUTOR), University of Port Harcourt. He works on mathematical and geospatial modelling of vector‑borne diseases, with experience from the Nigeria Modelling Fellowship and the Nigerian Institute of Medical Research. His interests include transmission dynamics of infectious diseases and using statistics to inform public‑health decisions.
  website: https://bikaiming93.github.io/teams/

- name: Gauri Vanjari
  role: Master Lab Intern
  photo: /images/Gauri_Vanjari.JPEG
  bio: Gauri Vanjari is a Master of Public Health (MPH) candidate at Cornell University with interests in infectious disease epidemiology, outbreak modeling, and data-driven public health interventions. Her capstone project focuses on modeling measles outbreak dynamics. As part of this work, she is collaborating with Dr. Bi’s lab to learn more about their research on measles transmission and modeling approaches. Gauri’s broader interests include integrating epidemiologic modeling, surveillance data, and behavioral dynamics to improve outbreak prediction and public health response.
  website: https://bikaiming93.github.io/teams/

- name: Muzaffar Ali
  role: High School Lab Intern
  photo: /images/Muzaffar_Ali.JPEG
  bio: Muzaffar Ali is a student at Klein Cain High School. He conducted research at the University of Houston with Dr. Charles Layne, working on data analysis of neurological diseases. His interests include applying computational and statistical methods to study complex biological systems and public health challenges. In the lab, he is excited to contribute to research on infectious disease dynamics and mobility data.
  website: https://bikaiming93.github.io/teams/
